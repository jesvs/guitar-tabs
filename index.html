<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🎸 Guitar Tabs Collection</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#0d0d0d;--card:#1a1a1a;--card-hover:#222;--text:#e0e0e0;--dim:#888;--border:#333;--accent:#e74c3c;--font-sans:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;--font-mono:'JetBrains Mono','Fira Code','Cascadia Code',Consolas,monospace}
html{scroll-behavior:smooth}
body{font-family:var(--font-sans);background:var(--bg);color:var(--text);min-height:100vh;line-height:1.6}

/* Header */
.header{background:linear-gradient(135deg,#1a1a1a,#0d0d0d);border-bottom:1px solid var(--border);padding:1.5rem;text-align:center;position:sticky;top:0;z-index:100;backdrop-filter:blur(10px)}
.header h1{font-size:1.8rem;font-weight:700;background:linear-gradient(135deg,#e74c3c,#e67e22);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.header p{color:var(--dim);font-size:.9rem;margin-top:.3rem}

/* Search */
.search-wrap{max-width:600px;margin:1.5rem auto;padding:0 1rem}
.search{width:100%;padding:.75rem 1rem;background:var(--card);border:1px solid var(--border);border-radius:8px;color:var(--text);font-size:1rem;outline:none;transition:border .2s}
.search:focus{border-color:var(--accent)}
.search::placeholder{color:#555}

/* Categories */
.container{max-width:900px;margin:0 auto;padding:1rem}
.category{margin-bottom:2.5rem}
.category-header{display:flex;align-items:center;gap:.75rem;margin-bottom:1rem;padding-bottom:.5rem;border-bottom:1px solid var(--border)}
.category-header h2{font-size:1.3rem;font-weight:600}
.cat-count{font-size:.8rem;color:var(--dim);background:var(--card);padding:.2rem .6rem;border-radius:99px}

/* Song cards */
.song-card{background:var(--card);border:1px solid var(--border);border-radius:10px;margin-bottom:.75rem;overflow:hidden;transition:border-color .2s}
.song-card:hover{border-color:#444}
.song-header{display:flex;align-items:center;justify-content:space-between;padding:1rem 1.25rem;cursor:pointer;user-select:none}
.song-header:hover{background:var(--card-hover)}
.song-info{flex:1}
.song-title{font-size:1.05rem;font-weight:600}
.song-artist{font-size:.85rem;color:var(--dim);margin-top:.15rem}
.song-actions{display:flex;align-items:center;gap:.5rem}
.badge{font-size:.7rem;padding:.2rem .6rem;border-radius:99px;font-weight:600;text-transform:uppercase;letter-spacing:.03em}
.badge-powerchords{background:#e74c3c22;color:#e74c3c;border:1px solid #e74c3c44}
.badge-tecnica{background:#e67e2222;color:#e67e22;border:1px solid #e67e2244}
.badge-acordes{background:#27ae6022;color:#27ae60;border:1px solid #27ae6044}
.badge-intermedio{background:#f1c40f22;color:#f1c40f;border:1px solid #f1c40f44}
.badge-barre{background:#9b59b622;color:#9b59b6;border:1px solid #9b59b644}
.badge-lead{background:#1abc9c22;color:#1abc9c;border:1px solid #1abc9c44}
.expand-icon{color:var(--dim);transition:transform .3s;font-size:.8rem}
.song-card.open .expand-icon{transform:rotate(180deg)}

/* Song body */
.song-body{max-height:0;overflow:hidden;transition:max-height .4s ease}
.song-card.open .song-body{max-height:100000px}
.song-content{padding:0 1.25rem 1.25rem}

/* Tab content */
.tab-content{font-family:var(--font-mono);font-size:.85rem;line-height:1.5;white-space:pre-wrap;word-break:break-word;background:#111;border:1px solid var(--border);border-radius:8px;padding:1.25rem;overflow-x:auto;color:#ccc;margin-bottom:1rem}
.tab-content b{color:#fff}

/* External link */
.external-link{display:inline-flex;align-items:center;gap:.5rem;padding:.6rem 1.2rem;background:var(--accent);color:#fff;text-decoration:none;border-radius:8px;font-weight:600;font-size:.9rem;transition:opacity .2s}
.external-link:hover{opacity:.85}

/* YouTube embed */
.yt-wrap{margin-bottom:1rem;border-radius:8px;overflow:hidden;aspect-ratio:16/9;background:#000}
.yt-wrap iframe{width:100%;height:100%;border:0}
.yt-fallback{display:flex;align-items:center;justify-content:center;height:100%;color:var(--dim);font-size:.9rem}

/* Footer */
.footer{text-align:center;padding:2rem 1rem;color:var(--dim);font-size:.8rem;border-top:1px solid var(--border);margin-top:2rem}
.footer a{color:var(--accent);text-decoration:none}


.yt-link{display:flex;flex-direction:column;align-items:center;gap:.5rem;text-decoration:none;color:#fff;margin-bottom:1rem;border-radius:8px;overflow:hidden;transition:opacity .2s}
.yt-link:hover{opacity:.85}
.yt-thumb{position:relative;width:100%;aspect-ratio:16/9;background:linear-gradient(135deg,#1a1a1a,#222);display:flex;align-items:center;justify-content:center;overflow:hidden}
.yt-thumb img{width:100%;height:100%;object-fit:cover}
.yt-play{position:absolute;width:60px;height:60px;background:rgba(0,0,0,.8);border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:1.5rem;border:2px solid rgba(255,255,255,.3)}
.yt-link span{font-size:.85rem;color:var(--dim);font-weight:500}

/* No results */
.no-results{text-align:center;padding:3rem 1rem;color:var(--dim)}
.no-results span{font-size:2rem;display:block;margin-bottom:.5rem}

/* Hide category when no visible songs */
.category.hidden{display:none}
.song-card.hidden{display:none}

/* Nav pills */
.nav-pills{display:flex;flex-wrap:wrap;gap:.4rem;justify-content:center;padding:0 1rem;margin-bottom:1.5rem}
.nav-pill{padding:.4rem .9rem;border-radius:99px;border:1px solid var(--border);background:transparent;color:var(--dim);font-size:.8rem;cursor:pointer;transition:all .2s;font-family:var(--font-sans)}
.nav-pill:hover,.nav-pill.active{background:var(--card);color:var(--text);border-color:#555}

@media(max-width:600px){
  .header h1{font-size:1.4rem}
  .tab-content{font-size:.75rem;padding:.75rem}
  .song-header{padding:.75rem 1rem}
  .song-content{padding:0 1rem 1rem}
  .nav-pill{font-size:.75rem;padding:.3rem .7rem}
}
</style>
</head>
<body>

<header class="header">
  <h1>🎸 Guitar Tabs Collection</h1>
  <p>35 canciones para aprender guitarra — de powerchords a lead</p>
</header>

<div class="search-wrap">
  <input type="text" class="search" id="search" placeholder="🔍 Buscar canción o artista..." autocomplete="off">
</div>

<div class="nav-pills" id="navPills"></div>

<div class="container" id="container"></div>

<footer class="footer">
  <p>Song list by <a href="https://www.reddit.com/r/guitarlessons/s/PEO04BaaY0" target="_blank" rel="noopener">u/Musician_Fitness</a> on r/guitarlessons</p>
  <p>Tabs de <a href="https://www.cifraclub.com.br" target="_blank">Cifra Club</a> &amp; <a href="https://www.songsterr.com" target="_blank">Songsterr</a> · Videos de YouTube</p>
</footer>

<script>
const SONGS=[
// -- DATA INJECTED BY PYTHON --
];

function loadSongs(){
  fetch('songs.json').then(r=>r.json()).then(data=>{
    renderNav(data);
    renderSongs(data);
    setupSearch(data);
  });
}

function badgeClass(key){
  const m={powerchords:'powerchords',tecnica:'tecnica',acordes:'acordes',intermedio:'intermedio',barre:'barre',lead:'lead'};
  return m[key]||'';
}

function esc(s){const d=document.createElement('div');d.textContent=s;return d.innerHTML;}

function ytEmbed(song,artist){
  const q=encodeURIComponent(artist+' '+song+' official');
  return `<div class="yt-wrap"><div class="yt-fallback" id="yt-${esc(song).replace(/[^a-z0-9]/gi,'')}">Cargando video...</div></div>`;
}

function renderNav(data){
  const nav=document.getElementById('navPills');
  let html='<button class="nav-pill active" data-cat="all">Todas</button>';
  data.forEach(c=>{
    html+=`<button class="nav-pill" data-cat="${c.key}">${c.label.split(' ').slice(1).join(' ')}</button>`;
  });
  nav.innerHTML=html;
  nav.querySelectorAll('.nav-pill').forEach(btn=>{
    btn.addEventListener('click',()=>{
      nav.querySelectorAll('.nav-pill').forEach(b=>b.classList.remove('active'));
      btn.classList.add('active');
      filterByCat(btn.dataset.cat,data);
    });
  });
}

function filterByCat(cat,data){
  const key=cat==='all'?null:cat;
  data.forEach(c=>{
    const el=document.getElementById('cat-'+c.key);
    if(el){
      if(!key||c.key===key){el.classList.remove('hidden');}
      else{el.classList.add('hidden');}
    }
  });
  const any=data.some(c=>{const el=document.getElementById('cat-'+c.key);return el&&!el.classList.contains('hidden');});
  document.getElementById('noResults').style.display=any?'none':'block';
}

function renderSongs(data){
  const container=document.getElementById('container');
  let html='<div id="noResults" class="no-results" style="display:none"><span>🔍</span>No se encontraron canciones</div>';
  data.forEach(cat=>{
    html+=`<div class="category" id="cat-${cat.key}">`;
    html+=`<div class="category-header"><h2>${cat.label}</h2><span class="cat-count">${cat.songs.length} canciones</span></div>`;
    cat.songs.forEach((s,i)=>{
      const bc=badgeClass(cat.key);
      if(s.is_url){
        html+=`<div class="song-card" data-search="${esc(s.song)} ${esc(s.artist)} ${esc(cat.key)}">
          <div class="song-header" onclick="toggleCard(this)">
            <div class="song-info"><div class="song-title">${esc(s.song)}</div><div class="song-artist">${esc(s.artist)}</div></div>
            <div class="song-actions"><span class="badge badge-${bc}">${esc(cat.key)}</span><span class="expand-icon">▼</span></div>
          </div>
          <div class="song-body"><div class="song-content">
            <a href="${esc(s.content)}" target="_blank" class="external-link">▶ Ver tab en Songsterr</a>
          </div></div>
        </div>`;
      } else {
        const tabId='tab-'+esc(s.song+'-'+s.artist).replace(/[^a-z0-9]/gi,'');
        const ytId='yt-'+esc(s.song).replace(/[^a-z0-9]/gi,'');
        html+=`<div class="song-card" data-search="${esc(s.song)} ${esc(s.artist)} ${esc(cat.key)}">
          <div class="song-header" onclick="toggleCard(this)">
            <div class="song-info"><div class="song-title">${esc(s.song)}</div><div class="song-artist">${esc(s.artist)}</div></div>
            <div class="song-actions"><span class="badge badge-${bc}">${esc(cat.key)}</span><span class="expand-icon">▼</span></div>
          </div>
          <div class="song-body"><div class="song-content">
            ${s.yt_id ? `<div class="yt-wrap"><iframe data-src="https://www.youtube.com/embed/${s.yt_id}" loading="lazy" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture" allowfullscreen></iframe></div>` : `<a href="https://www.youtube.com/results?search_query=${encodeURIComponent(s.artist+' '+s.song+' guitar lesson')}" target="_blank" class="yt-link"><span>▶ Buscar lesson en YouTube</span></a>`}
            <pre class="tab-content" id="${tabId}">${esc(s.content)}</pre>
          </div></div>
        </div>`;
      }
    });
    html+='</div>';
  });
  container.innerHTML=html;

  // Lazy load YouTube iframes
  const obs=new IntersectionObserver((entries)=>{
    entries.forEach(e=>{
      if(e.isIntersecting){
        const iframe=e.target.querySelector('iframe');
        if(iframe&&iframe.dataset.src){
          iframe.src=iframe.dataset.src;
          delete iframe.dataset.src;
        }
        obs.unobserve(e.target);
      }
    });
  },{rootMargin:'200px'});
  document.querySelectorAll('.yt-wrap').forEach(w=>obs.observe(w));
}

function pauseAllVideos(){
  document.querySelectorAll('.yt-wrap iframe').forEach(iframe=>{
    if(iframe.src&&!iframe.dataset.src){
      // Stop the video by resetting the src
      const src=iframe.src;
      iframe.src='';
      iframe.src=src;
    }
  });
}

function toggleCard(header){
  const card=header.parentElement;
  const wasOpen=card.classList.contains('open');
  if(!wasOpen){
    // Pause all videos before opening a new card
    pauseAllVideos();
  }
  // Close all others (and their videos)
  document.querySelectorAll('.song-card.open').forEach(c=>{
    c.classList.remove('open');
    // Pause video in the card being closed
    const iframe=c.querySelector('.yt-wrap iframe');
    if(iframe&&iframe.src&&!iframe.dataset.src){
      const src=iframe.src;
      iframe.src='';
      iframe.src=src;
    }
  });
  if(!wasOpen) card.classList.add('open');
}

function setupSearch(data){
  const input=document.getElementById('search');
  input.addEventListener('input',()=>{
    const q=input.value.toLowerCase().trim();
    if(!q){
      data.forEach(c=>{
        const el=document.getElementById('cat-'+c.key);
        if(el)el.classList.remove('hidden');
        el.querySelectorAll('.song-card').forEach(s=>s.classList.remove('hidden'));
      });
      document.getElementById('noResults').style.display='none';
      return;
    }
    let anyVisible=false;
    data.forEach(c=>{
      const el=document.getElementById('cat-'+c.key);
      let catHasVisible=false;
      el.querySelectorAll('.song-card').forEach(s=>{
        const search=s.dataset.search.toLowerCase();
        if(search.includes(q)){s.classList.remove('hidden');catHasVisible=true;}
        else{s.classList.add('hidden');}
      });
      if(catHasVisible){el.classList.remove('hidden');anyVisible=true;}
      else{el.classList.add('hidden');}
    });
    document.getElementById('noResults').style.display=anyVisible?'none':'block';
  });
}

loadSongs();
</script>
</body>
</html>
